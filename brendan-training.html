<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --yellow:#E8FF47;--orange:#FF6B35;--green:#A8E6CF;--purple:#C9B1FF;
  --red:#FF6B6B;--gold:#FFD93D;--teal:#4ECDC4;--blue:#378ADD;
  --bg:#0d0d0d;--bg1:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --t1:#f0f0f0;--t2:#aaa;--t3:#666;--t4:#444;--t5:#333;
  --success:#4caf50;--danger:#f44336;
  --font-mono:'Space Mono','Courier New',monospace;
  --font-display:'Bebas Neue',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font-mono);overscroll-behavior:none}
body{padding-bottom:env(safe-area-inset-bottom)}

#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#header{background:var(--bg1);border-bottom:2px solid var(--yellow);padding:16px 18px 14px;flex-shrink:0}
#header h1{font-family:var(--font-display);font-size:clamp(26px,7vw,44px);letter-spacing:2px;color:var(--yellow);line-height:1}
#header p{font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:2px}
#tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--bg4);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px;font-size:11px;letter-spacing:1.5px;font-weight:700;font-family:var(--font-mono);border:none;cursor:pointer;background:transparent;color:var(--t3);transition:all .15s}
.tab.active{background:var(--yellow);color:#0a0a0a}
#content{flex:1;padding:16px 16px 32px;overflow-y:auto}

.card{background:var(--bg2);border-radius:6px;cursor:pointer;transition:transform .15s;user-select:none}
.card:active{transform:scale(0.98)}
.session-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.session-card{padding:16px 14px;border-top:3px solid}
.session-card h2{font-family:var(--font-display);font-size:22px;margin-bottom:2px}
.session-card .tag{font-size:9px;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px}
.session-card .meta{font-size:10px;color:var(--t2)}
.session-card .week{font-size:10px;color:var(--t3);margin-top:2px}

.ex-row{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:4px;cursor:pointer;transition:background .1s}
.ex-row:active{background:rgba(255,255,255,0.07)}
.ex-num{font-family:var(--font-display);font-size:18px;color:var(--t5);min-width:22px}
.ex-name{flex:1;font-weight:700;font-size:13px;color:var(--t1)}
.ex-sub{font-size:10px;color:var(--orange);margin-top:2px}
.ex-sets{font-size:12px;font-weight:700;text-align:right}
.ex-tap{font-size:9px;color:var(--t4);margin-top:2px;text-align:right}
.superset-divider{display:flex;align-items:center;gap:8px;padding:6px 12px}
.superset-line{flex:1;height:1px;background:var(--orange);opacity:.4}
.superset-label{font-size:9px;color:var(--orange);letter-spacing:1.5px}

.back-btn{background:none;border:1px solid var(--t5);color:var(--t3);padding:6px 12px;border-radius:3px;cursor:pointer;font-family:var(--font-mono);font-size:11px}
.back-btn:active{border-color:var(--t3);color:var(--t1)}

.section-label{font-size:10px;color:var(--t3);letter-spacing:2px;margin-bottom:10px}

.info-block{background:var(--bg2);border-radius:4px;padding:14px;margin-bottom:12px}
.info-block.accent-left{border-left:3px solid}
.info-label{font-size:10px;letter-spacing:2px;margin-bottom:6px}
.info-value{font-family:var(--font-display);font-size:32px;margin-bottom:4px}
.info-note{font-size:11px;color:var(--t3);line-height:1.6}

.yt-btn{background:#FF0000;color:#fff;padding:5px 12px;border-radius:3px;font-size:10px;font-weight:700;text-decoration:none;letter-spacing:1px;font-family:var(--font-mono);display:inline-block}

.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .35s}

.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.macro-card{background:var(--bg2);border-radius:8px;padding:10px 8px}
.macro-lbl{font-size:11px;color:var(--t3);margin-bottom:3px}
.macro-val{font-size:17px;font-weight:500}
.macro-sub{font-size:10px;color:var(--t4)}

.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{border-radius:99px;padding:3px 10px;font-size:12px}

.bottle-grid{display:flex;gap:6px;flex-wrap:wrap}
.bottle-btn{cursor:pointer;border-radius:8px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--bg4);background:var(--bg1);transition:all .12s}
.bottle-btn.done{background:rgba(55,138,221,0.15);border-color:var(--blue)}
.bottle-btn:active{transform:scale(0.92)}

.check-row{cursor:pointer;border:0.5px solid var(--bg4);border-radius:10px;padding:10px 14px;background:var(--bg2);display:flex;align-items:center;gap:10px;margin-bottom:16px;user-select:none;transition:background .12s}
.check-row.done{background:rgba(76,175,80,0.08);border-color:var(--success)}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-circle.done{background:var(--success);border-color:var(--success)}

.meal-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--bg3)}
.meal-row:last-child{border-bottom:none}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--t4);font-size:16px;padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0;font-family:var(--font-mono)}
.rm-btn:active{background:rgba(244,67,54,0.15);color:var(--danger)}

.chip{cursor:pointer;border:0.5px solid var(--bg4);border-radius:99px;padding:4px 10px;font-size:12px;color:var(--t2);background:var(--bg2);white-space:nowrap;display:inline-block}
.chip:active{background:rgba(55,138,221,0.15);border-color:var(--blue);color:var(--blue)}
.chip-del{background:none;border:none;cursor:pointer;color:var(--t4);font-size:12px;padding:0 0 0 3px;line-height:1}

.form-box{background:var(--bg2);border-radius:10px;padding:16px}
.form-group{margin-bottom:10px}
.form-label{font-size:11px;color:var(--t3);margin-bottom:4px;display:block;letter-spacing:1px}
input[type=text],input[type=number]{border:0.5px solid var(--bg4);border-radius:8px;padding:9px 11px;font-size:14px;font-family:var(--font-mono);background:var(--bg1);color:var(--t1);width:100%;-webkit-appearance:none}
input:focus{outline:none;border-color:var(--blue)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{padding:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;border-radius:8px;font-family:var(--font-mono);letter-spacing:0.5px;transition:opacity .1s}
.btn:active{opacity:.8}
.btn-primary{background:var(--t1);color:#0d0d0d}
.btn-secondary{background:transparent;border:0.5px solid var(--bg4);color:var(--t3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

.wt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.wt-sessions{display:flex;gap:8px;margin-bottom:8px}
.wt-session-card{flex:1;background:var(--bg1);border-radius:6px;padding:10px 12px;min-width:0}
.wt-session-label{font-size:10px;color:var(--t4);margin-bottom:3px}
.wt-session-weight{font-size:18px;font-weight:700;margin-bottom:2px}
.wt-session-meta{font-size:12px;color:var(--t2)}
.wt-session-note{font-size:11px;color:var(--t4);font-style:italic;margin-top:3px}
.wt-progress{font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.wt-history-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg1);border-radius:4px;margin-bottom:4px}
.wt-hist-date{font-size:10px;color:var(--t4);min-width:38px}
.wt-hist-data{flex:1;font-size:12px;color:var(--t3)}
.wt-hist-note{font-size:11px;color:var(--t4);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.sprint-block{background:var(--bg2);border-radius:4px;border:1px solid var(--bg3);overflow:hidden;margin-bottom:8px}
.sprint-block-header{padding:13px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.sprint-block-content{padding:0 14px 13px;border-top:1px solid var(--bg3)}
.warmup-item{display:flex;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--bg3)}
.warmup-item:last-child{border-bottom:none}

.ct-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:18px}
.ct-day-pill{cursor:pointer;border-radius:8px;padding:8px 4px;text-align:center;user-select:none;border:0.5px solid var(--bg3);background:var(--bg2);transition:all .15s}
.ct-day-pill.active{border:2px solid var(--blue);background:rgba(55,138,221,0.12)}

.schedule-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:4px;margin-bottom:7px;border-left:3px solid}
.schedule-day{font-family:var(--font-display);font-size:20px;min-width:38px}
.schedule-activity{font-size:12px;color:#ddd;flex:1}

#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--t1);padding:8px 18px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap;font-family:var(--font-mono)}
#toast.show{opacity:1}

.ex-img-wrap{position:relative;border-radius:6px;overflow:hidden;background:var(--bg1);border:1px solid var(--bg3);margin-bottom:12px}
.ex-img-wrap img{width:100%;height:200px;object-fit:contain;display:block;background:#fff}
.ex-img-yt{position:absolute;bottom:8px;right:8px}
.ex-img-placeholder{height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}

.confirm-box{background:rgba(244,67,54,0.08);border:0.5px solid rgba(244,67,54,0.3);border-radius:10px;padding:14px}
.confirm-title{font-size:14px;font-weight:500;color:var(--danger);margin-bottom:6px}
.confirm-body{font-size:13px;color:var(--t3);margin-bottom:10px}

/* Install banner */
#install-banner{display:none;background:var(--bg2);border:1px solid var(--yellow);border-radius:8px;padding:12px 14px;margin:12px 16px 0;align-items:center;gap:10px}
#install-banner.show{display:flex}
#install-banner p{flex:1;font-size:11px;color:var(--t2);line-height:1.5}
#install-banner strong{color:var(--yellow)}
#install-btn{background:var(--yellow);color:#0d0d0d;border:none;border-radius:6px;padding:8px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-mono);white-space:nowrap}
#install-dismiss{background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;padding:0 2px;line-height:1}

.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}.mb-12{margin-bottom:12px}.mb-14{margin-bottom:14px}
.empty-state{padding:14px 0;text-align:center;font-size:13px;color:var(--t4)}
.text-success{color:var(--success)}.text-danger{color:var(--danger)}
.divider{height:1px;background:var(--bg3);margin:10px 0}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>BRENDAN'S TRAINING</h1>
    <p>UPPER/LOWER · 4× GYM · 5× ZONE 2 · 2× SPRINTS · 1,850 KCAL</p>
  </div>
  <div id="install-banner">
    <p><strong>Save to Home Screen</strong> — tap the share icon → "Add to Home Screen" to use this like an app. Data is saved in your browser forever.</p>
    <button id="install-btn" id="pwa-install">ADD APP</button>
    <button id="install-dismiss">×</button>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="workouts">WORKOUTS</button>
    <button class="tab" data-tab="sprints">SPRINTS</button>
    <button class="tab" data-tab="calories">CALORIES</button>
    <button class="tab" data-tab="schedule">SCHEDULE</button>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
// ─── PWA Install prompt ─────────────────────────────────
let deferredPrompt;
const banner = document.getElementById('install-banner');
const dismissed = localStorage.getItem('install_dismissed');
// Show iOS hint if not dismissed and not already standalone
if (!dismissed && !window.navigator.standalone && /iphone|ipad|ipod/i.test(navigator.userAgent)) {
  banner.classList.add('show');
}
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!dismissed) banner.classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { banner.classList.remove('show'); deferredPrompt = null; }); }
});
document.getElementById('install-dismiss').addEventListener('click', () => {
  banner.classList.remove('show'); localStorage.setItem('install_dismissed','1');
});

// ─── Storage helpers ────────────────────────────────────
const LS = {
  get(key, fallback = null) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
};

// ─── Data ───────────────────────────────────────────────
const EXERCISE_INFO = {
  "Bench Press":            { muscle:"Chest / Triceps / Front Delt",           cue:"Retract scapula, bar to lower chest, drive feet into floor",                                           rest:"3 min",   restNote:"compound — heavy lift, nervous system needs full recovery" },
  "Incline DB Press":       { muscle:"Upper Chest / Front Delt",               cue:"45° bench, dumbbells meet at top, elbows slightly flared",                                             rest:"2 min",   restNote:"compound" },
  "Seated Cable Row":       { muscle:"Lats / Rhomboids / Biceps",              cue:"Pull elbows back past torso, squeeze shoulder blades at end",                                          rest:"2 min",   restNote:"compound" },
  "Face Pulls":             { muscle:"Rear Delt / External Rotators / Traps",  cue:"Pull to forehead height, elbows flare OUT at end",                                                    rest:"60 sec",  restNote:"accessory" },
  "Lateral Raises":         { muscle:"Side (Medial) Delt",                     cue:"Lead with elbows, pinky up, stop at shoulder height",                                                 rest:"60 sec",  restNote:"accessory" },
  "Tricep Pushdown":        { muscle:"Triceps (all 3 heads)",                  cue:"Elbows locked at sides, extend fully, control the return",                                            rest:"45 sec",  restNote:"superset — rest 45s then go straight into EZ Bar Curl" },
  "EZ Bar Curl":            { muscle:"Biceps (long + short head)",             cue:"Full hang at bottom, squeeze at top, no body swinging",                                               rest:"45 sec",  restNote:"superset — rest 45s then go straight into Tricep Pushdown" },
  "Pull-Up / Lat Pulldown": { muscle:"Lats / Biceps / Rear Delt",             cue:"Dead hang start, pull elbows to hips, full stretch at top",                                           rest:"3 min",   restNote:"compound — heavy pull, take the full time" },
  "DB Row":                 { muscle:"Lats / Rhomboids / Rear Delt",          cue:"Elbow to hip, not shoulder. Squeeze at top. 'ea' = each arm.",                                       rest:"2 min",   restNote:"compound" },
  "Overhead Press":         { muscle:"Front + Side Delt / Triceps / Traps",   cue:"Bar starts at chin, press overhead, full lockout",                                                    rest:"3 min",   restNote:"compound — heavy overhead work, full recovery" },
  "Cable Rear Delt Fly":    { muscle:"Rear Delt / Mid Traps",                 cue:"Cross cables, pull arms in line with shoulder, slight bend in elbows",                               rest:"60 sec",  restNote:"accessory" },
  "Chest-Supported Row":    { muscle:"Upper Back / Rhomboids / Mid Traps",    cue:"Chest on pad, squeeze shoulder blades together at top",                                               rest:"90 sec",  restNote:"accessory" },
  "Incline DB Curl":        { muscle:"Biceps (long head stretch)",             cue:"Arm hangs behind body for max stretch at bottom. Don't swing.",                                      rest:"45 sec",  restNote:"superset — rest 45s then go straight into Overhead Tricep Ext." },
  "Overhead Tricep Ext.":   { muscle:"Triceps (long head)",                   cue:"Elbows point up and inward, lower behind head, extend fully",                                        rest:"45 sec",  restNote:"superset — rest 45s then go straight into Incline DB Curl" },
  "Back Squat":             { muscle:"Quads / Glutes / Hamstrings / Core",    cue:"Chest up, knees track over toes, hit parallel or below",                                             rest:"3 min",   restNote:"compound — heaviest leg exercise, take the full 3 minutes" },
  "Romanian Deadlift":      { muscle:"Hamstrings / Glutes / Spinal Erectors", cue:"Push hips back, feel hamstring stretch, spine neutral throughout",                                    rest:"2–3 min", restNote:"compound" },
  "Bulgarian Split Squat":  { muscle:"Quad / Glute / Hip Flexor",             cue:"Rear foot elevated, front shin vertical. 'ea' = each leg — do all reps one leg, then swap.",        rest:"2 min",   restNote:"compound — rest 2 min between legs too, not just between sets" },
  "Lying Leg Curl":         { muscle:"Hamstrings (knee flexion)",              cue:"Slow 3-sec lowering phase. Toes pointed. Squeeze glutes.",                                           rest:"90 sec",  restNote:"accessory" },
  "Ab Wheel Rollout":       { muscle:"Core (anti-extension) / Lats",          cue:"Roll out to just before hips drop, pull back with lats + abs",                                       rest:"60 sec",  restNote:"accessory" },
  "Box Jump":               { muscle:"Fast-twitch / Glutes / Quads",          cue:"Jump for HEIGHT, land SOFT with knees bent. Step down — don't jump down.",                          rest:"90 sec",  restNote:"power — full recovery between every rep, not just sets" },
  "Deadlift":               { muscle:"Hamstrings / Glutes / Back / Traps",    cue:"Bar over mid-foot, chest up, push floor away. Bar stays against legs.",                             rest:"3–4 min", restNote:"compound — the heaviest lift in the plan. Take every second." },
  "Goblet Squat":           { muscle:"Quads / Glutes / Core",                 cue:"Dumbbell at chest, elbows inside knees at bottom, heels down",                                      rest:"90 sec",  restNote:"accessory" },
  "Step-Up":                { muscle:"Quad / Glute (single leg)",             cue:"Drive through heel of top foot. No push-off from back foot. 'ea' = each leg.",                      rest:"90 sec",  restNote:"accessory — rest between each leg" },
  "Nordic Curl / Hamstring Curl":{ muscle:"Hamstrings (eccentric)",           cue:"Lower as slowly as possible. Push up with hands if needed.",                                         rest:"2 min",   restNote:"compound — brutal on hamstrings, full rest every time" },
  "Pallof Press":           { muscle:"Core (anti-rotation) / Obliques",       cue:"Stand sideways to cable, press out and resist rotation. Hold 2 sec. 'ea' = each side.",             rest:"60 sec",  restNote:"accessory — one of the best core exercises in the plan" },
  "Broad Jump":             { muscle:"Glutes / Quads / Calves / Power",       cue:"Max horizontal distance. Swing arms. Stick the landing. Full reset between every rep.",             rest:"90 sec",  restNote:"power — full reset between reps" },
};

const DAYS = [
  { id:"upper-a", label:"Upper A", tag:"PUSH FOCUS",  color:"#E8FF47", week:"MON + THU", duration:"~55 min",
    exercises:[{name:"Bench Press",sets:"4×6–8",sup:null},{name:"Incline DB Press",sets:"3×10–12",sup:null},{name:"Seated Cable Row",sets:"4×8–10",sup:null},{name:"Face Pulls",sets:"3×15",sup:null},{name:"Lateral Raises",sets:"3×15",sup:null},{name:"Tricep Pushdown",sets:"3×12",sup:"EZ Bar Curl"},{name:"EZ Bar Curl",sets:"3×12",sup:"Tricep Pushdown"}]},

// ─── Persistent data (localStorage) ────────────────────
function getCTData() {
  const def = { logs:{}, water:{}, creatine:{}, saved:[] };
  CT_DAYS.forEach(d => { def.logs[d.id] = []; def.water[d.id] = 0; def.creatine[d.id] = false; });
  const stored = LS.get("brendan_ct_v1", null);
  if (!stored) return def;
  CT_DAYS.forEach(d => {
    def.logs[d.id] = stored.logs?.[d.id] || [];
    def.water[d.id] = stored.water?.[d.id] || 0;
    def.creatine[d.id] = stored.creatine?.[d.id] || false;
  });
  def.saved = stored.saved || [];
  return def;
}
function saveCTData(data) { LS.set("brendan_ct_v1", data); }

function getWTData(exName) {
  const key = "brendan_wt_v1_" + exName.replace(/[^a-z0-9]/gi,"_");
  return LS.get(key, []);
}
function saveWTData(exName, data) {
  const key = "brendan_wt_v1_" + exName.replace(/[^a-z0-9]/gi,"_");
  LS.set(key, data);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");

}

function ctTots(id, data) {
  return (data.logs[id]||[]).reduce((a,x)=>({kcal:a.kcal+(+x.kcal||0),p:a.p+(+x.p||0),c:a.c+(+x.c||0),f:a.f+(+x.f||0)}),{kcal:0,p:0,c:0,f:0});

// ─── Render ─────────────────────────────────────────────
function render() {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === S.tab));
  const el = document.getElementById("content");
  let html = "";
  if (S.tab === "workouts") html = renderWorkouts();
  else if (S.tab === "sprints") html = renderSprints();
  else if (S.tab === "calories") html = renderCalories();
  else if (S.tab === "schedule") html = renderSchedule();
  el.innerHTML = html;
  attachEvents();
}

    <div style="font-size:10px;color:var(--t3);letter-spacing:2px;margin-top:2px">${s.subtitle}</div>
  </div>
  <div class="info-block accent-left mb-14" style="border-left-color:${s.color};font-size:12px;color:var(--t2);line-height:1.7">${s.desc}</div>
  <div class="section-label">WARM-UP</div>
  <div class="info-block mb-14">
    ${s.warmup.map((item,i) => `<div class="warmup-item"><div style="color:${s.color};font-size:10px;min-width:16px;padding-top:1px">${i+1}.</div><div style="font-size:12px;color:#ccc">${item}</div></div>`).join("")}
  </div>
  <div class="section-label">SPRINT BLOCKS — TAP TO EXPAND</div>
  ${s.blocks.map((b,i) => {
    const open = S.sprintExpanded[S.sprintSesh+"_"+i];
    return `<div class="sprint-block" style="${open?"border-color:"+s.color:""}">
      <div class="sprint-block-header" data-action="toggle-sprint-block" data-sesh="${S.sprintSesh}" data-idx="${i}">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--t1)">${b.label}</div>
          <div style="font-size:11px;color:${s.color};margin-top:3px">${b.reps} · ${b.rest}</div>
        </div>
        <div style="font-size:18px;color:var(--t4)">${open ? "−" : "+"}</div>
      </div>
      ${open ? `<div class="sprint-block-content">
        <div style="font-size:10px;color:${s.color};letter-spacing:2px;margin:10px 0 6px">COACHING CUE</div>
        <div style="font-size:12px;color:#ccc;line-height:1.7">${b.cue}</div>
      </div>` : ""}
    </div>`;
  }).join("")}
  <div class="section-label mt-14">COOL-DOWN</div>
  <div class="info-block" style="font-size:12px;color:var(--t2);line-height:1.7">${s.cooldown}</div>`;
}

// ─── CALORIES ───────────────────────────────────────────
function renderCalories() {
  const data = getCTData();
  const day = CT_DAYS.find(d => d.id === S.ctDay);
  const t = ctTots(S.ctDay, data);
  const bottlesDone = data.water[S.ctDay] || 0;
  const creatineDone = data.creatine[S.ctDay] || false;
  const waterHit = bottlesDone >= 9;
  const NAMES = {mon:"Monday",tue:"Tuesday",wed:"Wednesday",thu:"Thursday",fri:"Friday",sat:"Saturday",sun:"Sunday"};

  let pills = `<div class="ct-day-grid">`;
  CT_DAYS.forEach(d => {
    const dt = ctTots(d.id, data); const isA = d.id === S.ctDay;
    pills += `<div class="ct-day-pill${isA?" active":""}" data-action="ct-select-day" data-day="${d.id}">
      <div style="font-size:13px;font-weight:500;color:${isA?"var(--blue)":"var(--t1)"}">${d.label}</div>
      <div style="font-size:10px;color:${isA?"var(--blue)":"var(--t4)"};margin-top:1px">${cap(dt.kcal)}</div>
      <div class="bar-track" style="margin-top:4px"><div class="bar-fill" style="width:${pct(dt.kcal,d.kcal)}%;background:${MC.kcal}"></div></div>
    </div>`;
  });
  pills += `</div>`;

  if (S.ctView === "add") {
    const f = S.ctForm;
    return pills + `<div class="form-box">
      <div style="font-size:16px;font-weight:500;margin-bottom:14px">Add meal</div>
      <div class="form-group"><label class="form-label">MEAL NAME</label><input type="text" id="ct-name" value="${f.name}" placeholder="e.g. Chicken & rice" oninput="S.ctForm.name=this.value"></div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">CALORIES (kcal)</label><input type="number" id="ct-kcal" value="${f.kcal}" placeholder="e.g. 500" min="0" oninput="S.ctForm.kcal=this.value"></div>
        <div class="form-group"><label class="form-label">PROTEIN (g)</label><input type="number" id="ct-p" value="${f.p}" placeholder="e.g. 40" min="0" oninput="S.ctForm.p=this.value"></div>
        <div class="form-group"><label class="form-label">CARBS (g)</label><input type="number" id="ct-c" value="${f.c}" placeholder="e.g. 60" min="0" oninput="S.ctForm.c=this.value"></div>
        <div class="form-group"><label class="form-label">FAT (g)</label><input type="number" id="ct-f" value="${f.f}" placeholder="e.g. 15" min="0" oninput="S.ctForm.f=this.value"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" data-action="ct-cancel-add">Cancel</button>
        <button class="btn btn-primary" style="flex:2" data-action="ct-add" data-save="0">Add</button>
      </div>
      <button class="btn btn-secondary" style="width:100%;margin-top:8px" data-action="ct-add" data-save="1">Add &amp; save to meal library</button>
    </div>`;
  }

  const entries = data.logs[S.ctDay] || [];
  let html = pills;
  html += `<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
    <span style="font-size:20px;font-weight:500">${NAMES[S.ctDay]}</span>
    <span style="font-size:13px;color:var(--t3)">${day.note}</span>
  </div>`;

  html += `<div class="macro-grid">`;
  [[`Calories`,t.kcal,day.kcal,"kcal",MC.kcal],[`Protein`,t.p,day.p,"g",MC.p],[`Carbs`,t.c,day.c,"g",MC.c],[`Fat`,t.f,day.f,"g",MC.f]].forEach(([lbl,val,tgt,unit,col]) => {
    const over = val > tgt;
    html += `<div class="macro-card"><div class="macro-lbl">${lbl}</div>
      <div class="macro-val" style="color:${over?"var(--danger)":col}">${cap(val)}<span class="macro-sub"> /${cap(tgt)}${unit}</span></div>
      <div class="bar-track" style="margin-top:5px"><div class="bar-fill" style="width:${pct(val,tgt)}%;background:${over?"var(--danger)":col}"></div></div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="pill-row">`;
  [["Cal",day.kcal-t.kcal,"kcal"],["Pro",day.p-t.p,"g"],["Carbs",day.c-t.c,"g"],["Fat",day.f-t.f,"g"]].forEach(([lbl,v,u]) => {
    const over = v < 0;
    html += `<div class="pill" style="background:${over?"rgba(244,67,54,0.12)":"var(--bg2)"};color:${over?"var(--danger)":"var(--t3)"}">
      ${lbl}: <strong style="color:${over?"var(--danger)":"var(--t1)"}">${over?"+"+cap(Math.abs(v)):cap(v)}${u}</strong> ${over?"over":"left"}
    </div>`;
  });
  html += `</div>`;

  html += `<div class="info-block mb-10">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div><div style="font-size:14px;font-weight:500">Water</div><div style="font-size:11px;color:var(--t4);margin-top:1px">0.6L bottles · target 5L+</div></div>
      <div style="text-align:right"><div style="font-size:20px;font-weight:500;color:${waterHit?"var(--success)":"var(--blue)"}">${liters(bottlesDone)}L</div><div style="font-size:11px;color:var(--t4)">${bottlesDone} / 9</div></div>
    </div>
    <div class="bar-track" style="margin-bottom:10px"><div class="bar-fill" style="width:${pct(bottlesDone*600,5000)}%;background:var(--blue)"></div></div>
    <div class="bottle-grid">
      ${Array.from({length:9},(_,i) => {
        const done = i < bottlesDone;
        return `<button class="bottle-btn${done?" done":""}" data-action="ct-bottle" data-idx="${i}">
          <svg width="18" height="24" viewBox="0 0 18 24" fill="none">
            <path d="M6 2h6v2.5c0 .5.3 1 .8 1.3L14 7v13a2 2 0 01-2 2H6a2 2 0 01-2-2V7l1.2-1.2c.5-.3.8-.8.8-1.3V2z" stroke="${done?"#378ADD":"#444"}" stroke-width="1.2" fill="${done?"rgba(55,138,221,0.3)":"none"}"/>
            <line x1="4" y1="11" x2="14" y2="11" stroke="${done?"#378ADD":"#333"}" stroke-width="1"/>
          </svg>
        </button>`;
      }).join("")}
    </div>
    ${waterHit ? `<div style="margin-top:8px;font-size:12px;color:var(--success);font-weight:500">Target hit — well done</div>` : ""}
  </div>`;

  html += `<div class="check-row${creatineDone?" done":""}" data-action="ct-creatine">
    <div class="check-circle${creatineDone?" done":""}">
      ${creatineDone ? `<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#0d0d0d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>` : ""}
    </div>
    <div style="flex:1"><div style="font-size:14px;font-weight:500;color:${creatineDone?"var(--success)":"var(--t1)"}">Creatine — 5g</div><div style="font-size:11px;color:var(--t4);margin-top:1px">Post-workout · With a meal on rest days</div></div>
    <div style="font-size:12px;color:${creatineDone?"var(--success)":"var(--t4)"}">${creatineDone?"Done":"Tap to check off"}</div>
  </div>`;

  if (data.saved.length > 0) {
    html += `<div class="mb-10"><div style="font-size:11px;color:var(--t4);margin-bottom:6px">Saved meals — tap to add</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${data.saved.map((s,i) => `<div style="display:flex;align-items:center">
        <span class="chip" data-action="ct-add-saved" data-idx="${i}" title="${s.kcal}kcal · P${s.p}g · C${s.c}g · F${s.f}g">${s.name}</span>
        <button class="chip-del" data-action="ct-del-saved" data-idx="${i}">×</button>
      </div>`).join("")}
    </div></div>`;
  }

  html += `<div class="info-block mb-10" style="padding:8px 12px">
    ${entries.length === 0 ? `<div class="empty-state">Nothing logged yet</div>` :
      entries.map((m,i) => `<div class="meal-row">
        <button class="rm-btn" data-action="ct-remove-entry" data-idx="${i}">×</button>
        <div style="flex:1;min-width:0;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
        <div style="display:flex;gap:8px;font-size:12px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          <span style="color:${MC.kcal};font-weight:500">${cap(m.kcal)} kcal</span>
          <span style="color:${MC.p}">P:${cap(m.p)}g</span>
          <span style="color:${MC.c}">C:${cap(m.c)}g</span>
          <span style="color:${MC.f}">F:${cap(m.f)}g</span>
        </div>
      </div>`).join("")
    }
  </div>`;

  if (!S.ctConfirmReset) {
    html += `<div class="btn-row"><button class="btn btn-primary" style="flex:1" data-action="ct-open-add">+ Add meal</button><button class="btn btn-secondary" data-action="ct-confirm-reset">Reset week</button></div>`;
  } else {
    html += `<div class="confirm-box">
      <div class="confirm-title">Reset the whole week?</div>
      <div class="confirm-body">All logs, water and creatine will be cleared. Saved meals stay.</div>
      <div class="btn-row"><button class="btn btn-secondary" data-action="ct-cancel-reset">Cancel</button><button class="btn btn-danger" data-action="ct-do-reset">Yes, reset</button></div>
    </div>`;
  }
  return html;
}

// ─── SCHEDULE ───────────────────────────────────────────
function renderSchedule() {
  const rows = [
    {day:"MON",activity:"Upper A + Zone 2 (30 min after)",color:"#E8FF47"},
    {day:"TUE",activity:"Lower A + Zone 2 (30 min after)",color:"#FF6B35"},
    {day:"WED",activity:"Rest + Zone 2 only (walk/bike/jog)",color:"#4ECDC4"},
    {day:"THU",activity:"Upper B + Zone 2 (30 min after)",color:"#A8E6CF"},
    {day:"FRI",activity:"Lower B + Zone 2 (30 min after)",color:"#C9B1FF"},
    {day:"SAT",activity:"Sprints: Acceleration (10–20m reps)",color:"#FF6B6B"},
    {day:"SUN",activity:"Sprints: Top Speed (flying 30m) + Zone 2",color:"#FFD93D"},
  ];
  return rows.map(r => `<div class="schedule-row" style="border-left-color:${r.color}">
    <div class="schedule-day" style="color:${r.color}">${r.day}</div>
    <div class="schedule-activity">${r.activity}</div>
  </div>`).join("") +
  `<div class="info-block mt-14 accent-left" style="border-left-color:var(--teal)">
    <div class="info-label" style="color:var(--teal)">ZONE 2 TARGET</div>
    <div style="font-size:12px;color:#ccc;line-height:1.7"><strong style="color:var(--yellow)">~119–139 bpm</strong> (age 21). Should be able to talk but don't want to. 30 min per session.</div>
  </div>`;
}

// ─── Event delegation ───────────────────────────────────
function attachEvents() {
  if (S.tab === "workouts" && S.activeEx) loadExerciseImage(S.activeEx);
  document.getElementById("content").addEventListener("click", handleClick, { once: true });
}

function handleClick(e) {
  const el = e.target.closest("[data-action]");
  if (!el) { attachEvents(); return; }
  const action = el.dataset.action;

  if (action === "select-day")  { S.activeDay = el.dataset.day; S.activeEx = null; S.wtEditIdx = null; render(); return; }
  if (action === "back-day")    { S.activeDay = null; S.wtEditIdx = null; render(); return; }
  if (action === "select-ex")   { S.activeEx = decodeURIComponent(el.dataset.ex); S.wtEditIdx = null; render(); return; }
  if (action === "back-ex")     { S.activeEx = null; S.wtEditIdx = null; render(); return; }

  if (action === "wt-toggle-form") {
    const ex = decodeURIComponent(el.dataset.ex);
    if (!S.wtExpanded[ex]) S.wtExpanded[ex] = {};
    S.wtExpanded[ex].showForm = !S.wtExpanded[ex].showForm;
    render(); return;
  }
  if (action === "wt-save") {
    const ex = decodeURIComponent(el.dataset.ex);
    const weight = document.getElementById("wt-weight")?.value;
    if (!weight) { showToast("Enter a weight first"); attachEvents(); return; }
    const sets = document.getElementById("wt-sets")?.value || "4";
    const reps = document.getElementById("wt-reps")?.value || "?";
    const note = document.getElementById("wt-note")?.value?.trim() || "";
    const hist = getWTData(ex);
    hist.unshift({ date: todayStr(), sets, weight, reps, note, ts: Date.now() });
    saveWTData(ex, hist);
    if (!S.wtExpanded[ex]) S.wtExpanded[ex] = {};
    S.wtExpanded[ex].showForm = false;
    showToast("Session saved ✓");
    render(); return;
  }
  if (action === "wt-delete") {
    const ex = decodeURIComponent(el.dataset.ex);
    const idx = parseInt(el.dataset.idx);
    const hist = getWTData(ex);
    hist.splice(idx, 1);
    saveWTData(ex, hist);
    render(); return;
  }
  if (action === "wt-toggle-all") {
    const ex = decodeURIComponent(el.dataset.ex);
    if (!S.wtExpanded[ex]) S.wtExpanded[ex] = {};
    S.wtExpanded[ex].showAll = !S.wtExpanded[ex].showAll;
    render(); return;
  }
  if (action === "wt-edit") {
    S.wtEditIdx = parseInt(el.dataset.idx);
    render(); return;
  }
  if (action === "wt-edit-cancel") {
    S.wtEditIdx = null; render(); return;
  }
  if (action === "wt-edit-save") {
    const ex = decodeURIComponent(el.dataset.ex);
    const idx = parseInt(el.dataset.idx);
    const weight = document.getElementById("wt-edit-weight")?.value;
    if (!weight) { showToast("Enter a weight"); attachEvents(); return; }
    const hist = getWTData(ex);
    hist[idx] = {
      ...hist[idx],
      sets: document.getElementById("wt-edit-sets")?.value || hist[idx].sets,
      weight,
      reps: document.getElementById("wt-edit-reps")?.value || hist[idx].reps,
      note: document.getElementById("wt-edit-note")?.value?.trim() || "",
    };
    saveWTData(ex, hist);
    S.wtEditIdx = null;
    showToast("Session updated ✓");
    render(); return;
  }

  if (action === "select-sprint")       { S.sprintSesh = el.dataset.key; render(); return; }
  if (action === "back-sprint")         { S.sprintSesh = null; render(); return; }
  if (action === "toggle-sprint-block") {
    const key = el.dataset.sesh + "_" + el.dataset.idx;
    S.sprintExpanded[key] = !S.sprintExpanded[key];
    render(); return;
  }

  if (action === "ct-select-day")  { S.ctDay = el.dataset.day; S.ctConfirmReset = false; render(); return; }
  if (action === "ct-open-add")    { S.ctView = "add"; S.ctForm = {name:"",kcal:"",p:"",c:"",f:""}; render(); setTimeout(()=>document.getElementById("ct-name")?.focus(),50); return; }
  if (action === "ct-cancel-add")  { S.ctView = "main"; render(); return; }
  if (action === "ct-add") {
    const name = (document.getElementById("ct-name")?.value||S.ctForm.name).trim();
    if (!name) { showToast("Enter a meal name"); attachEvents(); return; }
    const entry = { name, kcal:+(document.getElementById("ct-kcal")?.value||S.ctForm.kcal)||0, p:+(document.getElementById("ct-p")?.value||S.ctForm.p)||0, c:+(document.getElementById("ct-c")?.value||S.ctForm.c)||0, f:+(document.getElementById("ct-f")?.value||S.ctForm.f)||0 };
    const data = getCTData();
    data.logs[S.ctDay].push(entry);
    if (el.dataset.save === "1" && !data.saved.find(s=>s.name.toLowerCase()===name.toLowerCase())) { data.saved.push({...entry}); showToast("Saved to meal library"); }
    saveCTData(data);
    S.ctView = "main"; render(); return;
  }
  if (action === "ct-remove-entry") {
    const data = getCTData(); data.logs[S.ctDay].splice(parseInt(el.dataset.idx),1); saveCTData(data); render(); return;
  }
  if (action === "ct-bottle") {
    const data = getCTData(); const cur = data.water[S.ctDay]||0; const i = parseInt(el.dataset.idx);
    data.water[S.ctDay] = i < cur ? i : i+1; saveCTData(data); render(); return;
  }
  if (action === "ct-creatine") {
    const data = getCTData(); data.creatine[S.ctDay] = !data.creatine[S.ctDay]; saveCTData(data); render(); return;
  }
  if (action === "ct-add-saved") {
    const data = getCTData(); const s = data.saved[parseInt(el.dataset.idx)]; if(!s){render();return;}
    data.logs[S.ctDay].push({...s}); saveCTData(data); render(); return;
  }
  if (action === "ct-del-saved") {
    const data = getCTData(); data.saved.splice(parseInt(el.dataset.idx),1); saveCTData(data); render(); return;
  }
  if (action === "ct-confirm-reset") { S.ctConfirmReset = true; render(); return; }
  if (action === "ct-cancel-reset")  { S.ctConfirmReset = false; render(); return; }
  if (action === "ct-do-reset") {
    const data = getCTData();
    CT_DAYS.forEach(d => { data.logs[d.id]=[]; data.water[d.id]=0; data.creatine[d.id]=false; });
    saveCTData(data); S.ctConfirmReset=false; render(); return;
  }

  attachEvents();
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    S.tab = t.dataset.tab;
    S.activeDay = null; S.activeEx = null; S.wtEditIdx = null; S.sprintSesh = null; S.ctConfirmReset = false;
    render();
  });
});

// ─── Async exercise image ───────────────────────────────
function loadExerciseImage(exName) {
  const searchName = exName.split("/")[0].trim();
  const ytLink = ytUrl(exName);
  fetch(`https://wger.de/api/v2/exercise/search/?term=${encodeURIComponent(searchName)}&language=english&format=json`)
    .then(r => r.json())
    .then(data => {
      const id = data?.suggestions?.[0]?.data?.id;
      if (!id) throw new Error("no id");
      return fetch(`https://wger.de/api/v2/exerciseimage/?exercise_base=${id}&format=json`);
    })
    .then(r => r.json())
    .then(data => {
      const img = data?.results?.[0]?.image;
      const wrap = document.getElementById("ex-img-wrap");
      if (!wrap) return;
      if (img) {
        wrap.innerHTML = `<img src="${img}" alt="${exName}" onerror="this.parentElement.innerHTML='<div class=\\'ex-img-placeholder\\'><a class=\\'yt-btn\\' href=\\'${ytLink}\\' target=\\'_blank\\'>▶ WATCH ON YOUTUBE</a></div>'"><div class="ex-img-yt"><a class="yt-btn" href="${ytLink}" target="_blank">▶ YT TUTORIAL</a></div>`;
      } else throw new Error("no img");
    })
    .catch(() => {
      const wrap = document.getElementById("ex-img-wrap");
      if (wrap) wrap.innerHTML = `<div class="ex-img-placeholder"><div style="font-size:11px;color:var(--t4);letter-spacing:1px;margin-bottom:10px">SEE HOW IT'S DONE</div><a class="yt-btn" href="${ytLink}" target="_blank">▶ WATCH ON YOUTUBE</a></div>`;
    });
}

// ─── Service Worker (inline, for offline support) ──────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'brendan-training-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if (e.request.url.startsWith('http')) {
        e.respondWith(caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => cached)));
      }
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

render();
</script>
